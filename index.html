<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./src/assets/icon.png" />
    <link rel="apple-touch-icon" href="./src/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="A story in chapters — a 2D narrative puzzle game" />
    <meta name="theme-color" content="#F2EFE9" />

    <!-- Open Graph -->
    <meta property="og:title" content="Between Pages" />
    <meta property="og:description" content="A story in chapters" />
    <meta property="og:type" content="website" />

    <!-- Fonts: Bellefair (main UI) + Playwrite Belgique Wallonie-Bruxelles (conversation) + Indie Flower (story/narration) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barrio&family=Bellefair&family=Indie+Flower&family=Playwrite+BE+WAL:wght@100..400&display=swap"
      rel="stylesheet"
    />

    <title>Between Pages</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        width: 100%; height: 100%;
        background: #F2EFE9;
        font-family: 'Bellefair', serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      /* Prevent text selection during drag */
      body { user-select: none; -webkit-user-select: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
